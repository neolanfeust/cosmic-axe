<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COSMIC AXE v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
#c { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
#hint { color:#4c1d95; font:10px monospace; text-align:center; margin-top:6px; letter-spacing:1px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Z/Espace: Attaque/Confirmer · X: Lourd · C: Pouvoir · ZQSD/Flèches: Déplacer · R: Restart</div>
<script>
// ════════════════════════════════════════════════
//  COSMIC AXE v2  —  Beat'em Up Sci-Fantasy
// ════════════════════════════════════════════════
const CV = document.getElementById('c');
const CX = CV.getContext('2d');
const BW = 480, BH = 270;
let SC = 1;
function resize(){
  SC = Math.max(1, Math.min(Math.floor(innerWidth/BW), Math.floor((innerHeight-40)/BH), 3));
  CV.width = BW*SC; CV.height = BH*SC; CX.imageSmoothingEnabled = false;
}
resize(); window.addEventListener('resize', resize);

// ── Palette ──────────────────────────────────────
const P = {
  void:'#050010', cosmos:'#0a0020', deep:'#120030',
  plasma:'#00d2ff', plasmaDim:'#0369a1',
  star:'#f7b731', starGlow:'#fef08a',
  nebula:'#a855f7', nebDim:'#6b21a8',
  white:'#ffffff', light:'#e8d5ff',
  hp:'#22c55e', hpDark:'#14532d',
  red:'#ef4444', redDark:'#7f1d1d',
  gold:'#fbbf24', orange:'#f97316',
  // chars
  kael1:'#a855f7', kael2:'#7c3aed', kaelAxe:'#00d2ff',
  lyra1:'#fbbf24', lyra2:'#f59e0b', lyraBlades:'#f0abfc',
  zorn1:'#1e40af', zorn2:'#1e3a8a', zornHammer:'#94a3b8',
};

// ── Math helpers ──────────────────────────────────
const rnd=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist2=(ax,ay,bx,by)=>Math.sqrt((ax-bx)**2+(ay-by)**2);

// ── Draw helpers ──────────────────────────────────
function px(x,y,w,h,c,glow,gc){
  if(glow){CX.shadowBlur=glow; CX.shadowColor=gc||c;}
  CX.fillStyle=c; CX.fillRect(~~x,~~y,w,h);
  if(glow){CX.shadowBlur=0;}
}
function circle(x,y,r,c,glow,gc){
  if(glow){CX.shadowBlur=glow; CX.shadowColor=gc||c;}
  CX.fillStyle=c; CX.beginPath(); CX.arc(~~x,~~y,r,0,Math.PI*2); CX.fill();
  if(glow){CX.shadowBlur=0;}
}
function ring(x,y,r,c,lw,glow){
  if(glow){CX.shadowBlur=glow; CX.shadowColor=c;}
  CX.strokeStyle=c; CX.lineWidth=lw||2;
  CX.beginPath(); CX.arc(~~x,~~y,r,0,Math.PI*2); CX.stroke();
  CX.lineWidth=1; if(glow)CX.shadowBlur=0;
}
function txt(s,x,y,sz,c,align,bold,glow){
  CX.font=`${bold?'bold ':''}${sz}px monospace`;
  CX.fillStyle=c; CX.textAlign=align||'left';
  if(glow){CX.shadowBlur=glow; CX.shadowColor=c;}
  CX.fillText(s,~~x,~~y);
  if(glow)CX.shadowBlur=0; CX.textAlign='left';
}
function gradRect(x,y,w,h,c1,c2,horiz){
  const g=horiz?CX.createLinearGradient(x,0,x+w,0):CX.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  CX.fillStyle=g; CX.fillRect(~~x,~~y,w,h);
}

// ── Input ─────────────────────────────────────────
const K={};
const KCODE={'ArrowLeft':'left','ArrowRight':'right','ArrowUp':'up','ArrowDown':'down',
  'KeyA':'left','KeyD':'right','KeyW':'up','KeyS':'down','KeyQ':'left','Space':'jump'};
const KCHAR={'z':'atk','j':'atk','enter':'atk',' ':'jump','x':'heavy','k':'heavy','c':'power','l':'power','r':'restart'};
window.addEventListener('keydown',e=>{
  const a=KCODE[e.code], b=KCHAR[e.key?.toLowerCase()];
  if(a)K[a]=true; if(b)K[b]=true;
  if(a||b)e.preventDefault();
});
window.addEventListener('keyup',e=>{
  const a=KCODE[e.code], b=KCHAR[e.key?.toLowerCase()];
  if(a)K[a]=false; if(b)K[b]=false;
});
const prev={};
function edge(k){ const v=K[k]&&!prev[k]; prev[k]=K[k]; return v; }
function updatePrev(){ Object.keys(K).forEach(k=>prev[k]=K[k]); }

// ── Particles ─────────────────────────────────────
const PARTS=[];
function part(x,y,vx,vy,c,life,sz,glow,blend){
  PARTS.push({x,y,vx,vy,c,life,ml:life,sz:sz||2,glow:glow||0,blend:blend||'source-over'});
}
function burstParts(x,y,c,n,spd,glow,blend){
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2),s=rnd(spd*.4,spd);
    part(x,y,Math.cos(a)*s,Math.sin(a)*s-rnd(0,40),c,rnd(.3,.8),rnd(2,5),glow,blend);
  }
}
function updateParts(dt){
  for(const p of PARTS){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=220*dt;p.life-=dt;}
  PARTS.splice(0,PARTS.length,...PARTS.filter(p=>p.life>0));
}
function drawParts(ox){
  for(const p of PARTS){
    const a=p.life/p.ml;
    CX.globalAlpha=a;
    CX.globalCompositeOperation=p.blend;
    if(p.glow){CX.shadowBlur=p.glow;CX.shadowColor=p.c;}
    CX.fillStyle=p.c;
    CX.fillRect(~~(p.x-ox)-p.sz/2,~~p.y-p.sz/2,p.sz,p.sz);
    CX.shadowBlur=0;
    CX.globalCompositeOperation='source-over';
    CX.globalAlpha=1;
  }
}

// ── Float texts ───────────────────────────────────
const FTXTS=[];
function ftxt(x,y,s,c,sz,glow){ FTXTS.push({x,y,s,c,sz:sz||6,life:.9,vy:-28,glow:glow||0}); }
function updateFtxts(dt){ for(const f of FTXTS){f.y+=f.vy*dt;f.life-=dt;} FTXTS.splice(0,FTXTS.length,...FTXTS.filter(f=>f.life>0)); }
function drawFtxts(ox){ for(const f of FTXTS){ const a=Math.min(1,f.life*2); CX.globalAlpha=a; txt(f.s,~~(f.x-ox),~~f.y,f.sz,f.c,'center',true,f.glow); CX.globalAlpha=1; } }

// ── Screen shake ──────────────────────────────────
let shk=0,shkM=0;
function shake(m,d){ if(m>shkM){shkM=m;shk=d;} }
let hitstop=0;

// ── Stars background ──────────────────────────────
const STARS=Array.from({length:150},()=>({x:rnd(0,BW),y:rnd(0,BH*.7),sz:rnd(.5,2.5),spd:rnd(.05,.4),tw:rnd(0,Math.PI*2),c:['#ffffff','#a78bfa','#7dd3fc','#fbbf24'][~~rnd(0,4)]}));

// ══════════════════════════════════════════════════
//  LEVEL BACKGROUNDS
// ══════════════════════════════════════════════════
const FLOOR_Y = BH - 48;

function drawBg(lvl, camX){
  const t=Date.now()/1000;
  // Sky gradient per level
  const skies=[
    ['#050010','#0a0025','#180040'],  // L1 violet
    ['#001a20','#002a30','#003a40'],  // L2 teal
    ['#100005','#1a0008','#250010'],  // L3 crimson
  ][lvl];
  const g=CX.createLinearGradient(0,0,0,BH);
  g.addColorStop(0,skies[0]); g.addColorStop(.6,skies[1]); g.addColorStop(1,skies[2]);
  CX.fillStyle=g; CX.fillRect(0,0,BW,BH);

  // Stars (layer 0 - slowest)
  for(const s of STARS){
    const tw=Math.sin(t*1.1+s.tw)*.4+.7;
    CX.globalAlpha=tw*.8;
    CX.fillStyle=s.c;
    const sx=((s.x-camX*s.spd)%BW+BW)%BW;
    CX.fillRect(~~sx,~~s.y,Math.ceil(s.sz),Math.ceil(s.sz));
  }
  CX.globalAlpha=1;

  // Nebula clouds
  const nColors=[['#3b0764','#1e1b4b'],['#064e3b','#0c4a6e'],['#3b0018','#1c0010']][lvl];
  CX.globalAlpha=.07;
  CX.fillStyle=nColors[0];
  CX.beginPath(); CX.ellipse(((100-camX*.08)%BW+BW)%BW,55,130,55,0.3,0,Math.PI*2); CX.fill();
  CX.fillStyle=nColors[1];
  CX.beginPath(); CX.ellipse(((320-camX*.06)%BW+BW)%BW,40,100,40,-0.2,0,Math.PI*2); CX.fill();
  CX.globalAlpha=1;

  // Far background structures (layer 1)
  CX.globalAlpha=.2;
  if(lvl===0){ // Stellar Fortress distant towers
    for(let i=0;i<6;i++){
      const bx=((i*110+50-camX*.12)%(BW+120)+BW+120)%(BW+120)-60;
      const bh=40+i*12;
      CX.fillStyle='#1a0040';
      CX.fillRect(~~bx,FLOOR_Y-bh,18,bh);
      CX.fillStyle='#7c3aed';
      CX.fillRect(~~bx+5,FLOOR_Y-bh,8,4);
      CX.globalAlpha=.35;
      CX.fillStyle='#a855f7';
      CX.fillRect(~~bx+6,FLOOR_Y-bh+6,5,6);
      CX.globalAlpha=.2;
    }
  } else if(lvl===1){ // Nebula Sea - floating islands
    for(let i=0;i<5;i++){
      const ix=((i*130+30-camX*.1)%(BW+160)+BW+160)%(BW+160)-80;
      const iy=FLOOR_Y-60+Math.sin(t*.4+i)*8;
      CX.fillStyle='#0a2a30';
      CX.fillRect(~~ix,~~iy,60,18);
      CX.globalAlpha=.4;
      CX.fillStyle='#00d2ff';
      CX.fillRect(~~ix,~~iy,60,2);
      CX.globalAlpha=.2;
    }
  } else { // Void Citadel
    CX.fillStyle='#1a0008';
    const cx2=((-camX*.08+200)%(BW+200)+BW+200)%(BW+200)-100;
    CX.fillRect(~~cx2,FLOOR_Y-120,80,120);
    CX.fillRect(~~cx2+25,FLOOR_Y-150,30,150);
    CX.globalAlpha=.4;
    CX.fillStyle='#dc2626';
    CX.fillRect(~~cx2+38,FLOOR_Y-155,6,8);
  }
  CX.globalAlpha=1;

  // Mid-ground ruins (layer 2)
  const mgColors=[['#2a0060','#7c3aed'],['#004040','#00d2ff'],['#3a0010','#dc2626']][lvl];
  CX.globalAlpha=.45;
  for(let i=0;i<5;i++){
    const rx=((i*160+40-camX*.38)%(BW+200)+BW+200)%(BW+200)-100;
    CX.fillStyle=mgColors[0];
    CX.fillRect(~~rx,FLOOR_Y-38,32,38);
    CX.fillStyle=mgColors[1];
    CX.fillRect(~~rx+8,FLOOR_Y-38,16,4);
    CX.globalAlpha=.7;
    CX.fillStyle=mgColors[1];
    CX.fillRect(~~rx+5,FLOOR_Y-30,7,9);
    CX.fillRect(~~rx+18,FLOOR_Y-30,7,9);
    CX.globalAlpha=.45;
  }
  CX.globalAlpha=1;

  // Floor
  const floorColors=[['#12003a','#7c3aed'],['#001820','#00d2ff'],['#1a0005','#dc2626']][lvl];
  CX.fillStyle=floorColors[0];
  CX.fillRect(0,FLOOR_Y,BW,BH-FLOOR_Y);
  // Floor glow line
  CX.shadowBlur=8; CX.shadowColor=floorColors[1];
  CX.fillStyle=floorColors[1];
  CX.fillRect(0,FLOOR_Y,BW,2);
  CX.shadowBlur=0;
  // Floor tiles
  CX.globalAlpha=.12;
  CX.fillStyle=floorColors[1];
  for(let i=0;i<BW/24+2;i++){
    const tx=((i*24-camX*.92)%BW+BW)%BW;
    CX.fillRect(~~tx,FLOOR_Y,1,BH-FLOOR_Y);
  }
  CX.globalAlpha=1;
  // Floor depth gradient
  const fg=CX.createLinearGradient(0,FLOOR_Y,0,BH);
  fg.addColorStop(0,floorColors[1]+'22'); fg.addColorStop(1,'transparent');
  CX.fillStyle=fg; CX.fillRect(0,FLOOR_Y+2,BW,BH-FLOOR_Y-2);
}

// ══════════════════════════════════════════════════
//  POST-PROCESSING
// ══════════════════════════════════════════════════
function postProcess(){
  // Vignette
  const vg=CX.createRadialGradient(BW/2,BH/2,BH*.3,BW/2,BH/2,BH*.85);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,0.55)');
  CX.fillStyle=vg; CX.fillRect(0,0,BW,BH);
  // Scanlines (subtle)
  CX.globalAlpha=.04;
  CX.fillStyle='#000';
  for(let y=0;y<BH;y+=2) CX.fillRect(0,y,BW,1);
  CX.globalAlpha=1;
}

// ══════════════════════════════════════════════════
//  CHARACTER DEFINITIONS
// ══════════════════════════════════════════════════
const CHAR_DEFS = [
  { // 0 - KAEL
    name:'Kael', title:'Marcheur du Vide',
    desc:'Équilibré · Hache de plasma · AoE magique',
    hp:100, spd:90, atkDmg:8, hvyDmg:18, powerCost:3,
    c1:P.kael1, c2:P.kael2, cw:P.kaelAxe,
    powerName:'Fission Nébuleuse',
    powerDesc:'Onde circulaire plasma',
  },
  { // 1 - LYRA
    name:'Lyra', title:'Chasseuse des Étoiles',
    desc:'Rapide · Lames stellaires · Pluie d\'étoiles',
    hp:75, spd:125, atkDmg:6, hvyDmg:12, powerCost:2,
    c1:P.lyra1, c2:P.lyra2, cw:P.lyraBlades,
    powerName:'Pluie Stellaire',
    powerDesc:'Projectiles tombant du ciel',
  },
  { // 2 - ZORN
    name:'Zorn', title:'Titan de Nébuleuse',
    desc:'Lent · Marteau de vide · Effondrement gravitaire',
    hp:150, spd:58, atkDmg:13, hvyDmg:28, powerCost:3,
    c1:P.zorn1, c2:P.zorn2, cw:P.zornHammer,
    powerName:'Effondrement Gravitaire',
    powerDesc:'Aspire les ennemis puis explose',
  },
];

// ══════════════════════════════════════════════════
//  CHARACTER DRAWING (pixel art style)
// ══════════════════════════════════════════════════
function drawKael(x,y,facing,state,f1,iframes,dead,alpha){
  const t=Date.now()/1000;
  CX.globalAlpha=alpha;
  const c1=f1?P.white:P.kael1, c2=f1?P.white:P.kael2, cw=f1?P.white:P.kaelAxe;
  const atk=state==='atk'||state==='hvy';
  const walk=state==='walk';
  const ls=walk?Math.sin(t*10)*3:0;
  // Shadow
  CX.globalAlpha=alpha*.25; CX.fillStyle='#000';
  CX.beginPath(); CX.ellipse(x,y+2,9,4,0,0,Math.PI*2); CX.fill(); CX.globalAlpha=alpha;
  // Legs
  px(x-6+ls*facing,y-10,5,10,c2); px(x+1-ls*facing,y-10,5,10,c2);
  // Kneepads
  px(x-6+ls*facing,y-14,5,4,c1); px(x+1-ls*facing,y-14,5,4,c1);
  // Body/torso
  px(x-7,y-22,14,12,c1,atk?8:0,cw);
  // Chest armor
  CX.globalAlpha=alpha*.7; px(x-5,y-21,10,7,c2); CX.globalAlpha=alpha;
  // Glowing chest emblem
  CX.shadowBlur=6; CX.shadowColor=cw; px(x-2,y-19,4,4,cw); CX.shadowBlur=0;
  // Arms
  if(atk&&state==='hvy'){
    px(x+(facing>0?7:-16),y-23,9,5,c1,4,cw);
    px(x-7,y-22,4,8,c1);
  } else if(atk){
    px(x+(facing>0?6:-14),y-22,8,5,c1);
    px(x-7,y-22,4,8,c1);
  } else {
    px(x-8,y-22,4,8,c1); px(x+8,y-22,4,8,c1);
  }
  // Shoulders (pauldrons)
  px(x-9,y-24,5,4,c2); px(x+8,y-24,5,4,c2);
  // Head
  px(x-5,y-30,10,8,c1);
  // Helmet
  px(x-4,y-32,8,4,c2);
  // Helmet glow slit
  CX.shadowBlur=5; CX.shadowColor=cw; px(x-3,y-30,6,2,cw); CX.shadowBlur=0;
  // Eyes
  CX.shadowBlur=4; CX.shadowColor=cw; px(x-3+facing,y-27,3,2,cw); CX.shadowBlur=0;
  // Cape flutter
  CX.globalAlpha=alpha*.5;
  px(x-(facing>0?8:2),y-20,4,12,c2);
  CX.globalAlpha=alpha;
  // Axe
  const ax=x+(facing>0?9:-21), ay=y-30;
  px(ax+(facing>0?0:12),ay+8,12,3,'#8b5cf6');
  if(atk){
    CX.shadowBlur=12; CX.shadowColor=cw; CX.globalAlpha=alpha*.35;
    CX.fillStyle=cw; CX.beginPath(); CX.ellipse(ax+6,ay+10,18,10,0,0,Math.PI*2); CX.fill();
    CX.globalAlpha=alpha; CX.shadowBlur=0;
    CX.shadowBlur=8; CX.shadowColor=cw;
    px(ax,ay,10,14,cw); px(ax+(facing>0?8:-6),ay-4,5,7,'#7dd3fc');
    CX.shadowBlur=0;
  } else {
    px(ax+(facing>0?2:0),ay+2,8,10,cw);
    px(ax+(facing>0?6:-4),ay-2,4,5,'#7dd3fc');
  }
  if(iframes>0&&Math.floor(iframes*12)%2===0){ CX.globalAlpha=alpha*.3; px(x-9,y-34,18,36,'#fff'); }
  CX.globalAlpha=1;
}

function drawLyra(x,y,facing,state,f1,iframes,dead,alpha){
  const t=Date.now()/1000;
  CX.globalAlpha=alpha;
  const c1=f1?P.white:P.lyra1, c2=f1?P.white:P.lyra2, cw=f1?P.white:P.lyraBlades;
  const atk=state==='atk'||state==='hvy';
  const walk=state==='walk';
  const ls=walk?Math.sin(t*13)*4:0;
  // Shadow
  CX.globalAlpha=alpha*.2; CX.fillStyle='#000';
  CX.beginPath(); CX.ellipse(x,y+2,7,3,0,0,Math.PI*2); CX.fill(); CX.globalAlpha=alpha;
  // Slim legs
  px(x-4+ls*facing,y-8,4,8,c2); px(x+1-ls*facing,y-8,4,8,c2);
  // Boots
  px(x-5+ls*facing,y-4,5,4,c1); px(x+1-ls*facing,y-4,5,4,c1);
  // Lithe body
  px(x-5,y-20,10,12,c1);
  // Sash/belt
  CX.globalAlpha=alpha*.8; px(x-5,y-12,10,3,c2); CX.globalAlpha=alpha;
  // Star motif on chest
  CX.shadowBlur=5; CX.shadowColor=cw; circle(x,y-17,3,cw); CX.shadowBlur=0;
  // Arms
  if(atk){
    px(x+(facing>0?5:-13),y-21,8,4,c1);
    px(x+(facing>0?5:-13),y-22,8,4,c2);
  } else { px(x-6,y-20,4,7,c1); px(x+6,y-20,4,7,c1); }
  // Shoulder guards (small)
  px(x-6,y-22,4,3,c2); px(x+6,y-22,4,3,c2);
  // Head (smaller)
  px(x-4,y-27,8,7,c1);
  // Hair
  px(x-3,y-29,7,3,c2);
  px(x+(facing>0?-5:-3),y-28,3,10,c2); // flowing hair
  // Star diadem glow
  CX.shadowBlur=6; CX.shadowColor=P.starGlow; circle(x,y-29,2,P.star); CX.shadowBlur=0;
  // Eyes
  px(x+(facing>0?1:-2),y-25,2,2,cw);
  // Twin blades
  for(let i=0;i<2;i++){
    const bx=x+(facing>0?5+i*4:-13-i*4), by=y-22;
    CX.shadowBlur=atk?10:4; CX.shadowColor=cw;
    px(bx,by,3,atk?18:14,cw);
    CX.shadowBlur=0;
    px(bx-1,by,5,3,P.lyra2);
  }
  if(iframes>0&&Math.floor(iframes*12)%2===0){ CX.globalAlpha=alpha*.3; px(x-8,y-31,16,33,'#fff'); }
  CX.globalAlpha=1;
}

function drawZorn(x,y,facing,state,f1,iframes,dead,alpha){
  const t=Date.now()/1000;
  CX.globalAlpha=alpha;
  const c1=f1?P.white:P.zorn1, c2=f1?P.white:P.zorn2, cw=f1?P.white:P.zornHammer;
  const atk=state==='atk'||state==='hvy';
  const walk=state==='walk';
  const ls=walk?Math.sin(t*7)*2:0;
  // Shadow (big)
  CX.globalAlpha=alpha*.3; CX.fillStyle='#000';
  CX.beginPath(); CX.ellipse(x,y+2,13,5,0,0,Math.PI*2); CX.fill(); CX.globalAlpha=alpha;
  // Thick legs
  px(x-8+ls*facing,y-12,8,12,c2); px(x+1-ls*facing,y-12,8,12,c2);
  // Greaves
  px(x-9+ls*facing,y-6,9,6,c1); px(x+1-ls*facing,y-6,9,6,c1);
  // Massive torso
  px(x-11,y-28,22,16,c1,atk?6:0,'#3b82f6');
  // Armor plates
  CX.globalAlpha=alpha*.6; px(x-9,y-27,18,10,c2); CX.globalAlpha=alpha;
  // Glowing rune on chest
  CX.shadowBlur=8; CX.shadowColor='#3b82f6';
  px(x-3,y-24,6,2,'#60a5fa'); px(x-1,y-26,2,6,'#60a5fa');
  CX.shadowBlur=0;
  // Arms (bulky)
  if(atk&&state==='hvy'){
    px(x+(facing>0?11:-24),y-30,13,6,c1,6,'#3b82f6');

class Entity {
  constructor(x,y,hp,w,h){ this.x=x;this.y=y;this.hp=hp;this.maxHp=hp;this.w=w||12;this.h=h||20;this.vx=0;this.vy=0;this.alive=true;this.onGround=true;this.facing=1;this.iframes=0;this.hf=0; }
  applyGravity(dt){ if(!this.onGround){this.vy+=600*dt;} this.y+=this.vy*dt; if(this.y>=FLOOR_Y){this.y=FLOOR_Y;this.vy=0;this.onGround=true;} }
  clamp(lo,hi){ this.x=clamp(this.x,lo+this.w/2,hi-this.w/2); this.y=clamp(this.y,FLOOR_Y-30,FLOOR_Y); }
  hit(dmg,kx,ky){ if(this.iframes>0||!this.alive)return false; this.hp-=dmg; this.hf=.12; this.iframes=.28; if(kx||ky){this.vx=kx;this.vy=ky;this.onGround=false;} if(this.hp<=0){this.alive=false;this.onDie();} burstParts(this.x,this.y-this.h/2,P.star,5,70,8); return true; }
  onDie(){}
  drawHpBar(){ const bw=this.w+6,bx=this.x-bw/2,by=this.y-this.h-8; px(bx,by,bw,3,P.hpDark); const r=this.hp/this.maxHp; px(bx,by,~~(bw*r),3,r>.5?P.hp:'#facc15'); }
}

// ── Player ────────────────────────────────────────
class Player extends Entity {
  constructor(x,y,charIdx){
    const d=CHAR_DEFS[charIdx];
    super(x,y,d.hp,CHAR_W[charIdx],CHAR_H[charIdx]);
    this.ci=charIdx; this.d=d;
    this.magic=0; this.maxMagic=3;
    this.combo=0; this.comboT=0; this.comboDisp=0;
    this.atkT=0; this.isAtk=false; this.isHvy=false;
    this.pwrCd=0;
    this.hitSet=new Set();
    this.state='idle'; this.deathT=0;
    this.score=0;
    this.pvAtk=false; this.pvHvy=false; this.pvPwr=false; this.pvJmp=false;
  }
  update(dt,inp,enemies,G){
    if(!this.alive){this.deathT+=dt;return;}
    this.iframes=Math.max(0,this.iframes-dt);
    this.hf=Math.max(0,this.hf-dt);
    this.pwrCd=Math.max(0,this.pwrCd-dt);
    if(this.comboT>0){this.comboT-=dt;if(this.comboT<=0){this.combo=0;this.comboDisp=0;}}
    const atk=inp.atk&&!this.pvAtk, hvy=inp.heavy&&!this.pvHvy, pwr=inp.power&&!this.pvPwr, jmp=inp.jump&&!this.pvJmp;
    this.pvAtk=inp.atk;this.pvHvy=inp.heavy;this.pvPwr=inp.power;this.pvJmp=inp.jump;
    // Power
    if(pwr&&this.magic>=this.d.powerCost&&this.pwrCd<=0&&!this.isAtk) this.activatePower(enemies,G);
    // Jump
    if(jmp&&this.onGround&&!this.isAtk){this.vy=-270;this.onGround=false;}
    // Attack timers
    if(this.atkT>0){
      this.atkT-=dt;
      const full=this.isHvy?.42:.25;
      const el=full-this.atkT;
      const win=this.isHvy?.16:.08;
      if(el>=win&&el<win+.13){this.doHit(enemies,G);}
      if(this.atkT<=0){this.isAtk=false;this.isHvy=false;this.hitSet.clear();}
    }
    if(!this.isAtk){
      if(atk){this.startAtk(false,G);}
      else if(hvy){this.startAtk(true,G);}
    }
    // Move
    const spd=this.isAtk&&this.onGround?this.d.spd*.15:this.d.spd;
    if(!this.isAtk||!this.onGround){
      this.vx=inp.lx*spd;
      if(this.onGround)this.y+=inp.ly*spd*.5*dt;
      if(inp.lx)this.facing=Math.sign(inp.lx);
    } else this.vx=0;
    this.x+=this.vx*dt;
    this.applyGravity(dt);
    this.clamp(G.camX-20,G.camX+BW+20);
    this.y=clamp(this.y,FLOOR_Y-32,FLOOR_Y);
    // State
    if(this.isAtk)this.state=this.isHvy?'hvy':'atk';
    else if(Math.abs(this.vx)>5||Math.abs(inp.lx)>.1)this.state='walk';
    else this.state='idle';
  }
  startAtk(hvy,G){
    this.isAtk=true;this.isHvy=hvy;
    this.atkT=hvy?.42:.25;
    this.hitSet.clear();
    shake(hvy?2:1,.08);
    burstParts(this.x+this.facing*14,this.y-12,hvy?P.zornHammer:this.d.cw,hvy?7:3,60,10,'lighter');
  }
  doHit(enemies,G){
    const reach=this.isHvy?26:20;
    const hbx=this.x+(this.facing>0?this.w/2:-reach-this.w/2), hby=this.y-this.h, hbh=this.h;
    for(const e of enemies){
      if(!e.alive||this.hitSet.has(e))continue;
      if(e.x-e.w/2<hbx+reach&&e.x+e.w/2>hbx&&e.y-e.h<hby+hbh&&e.y>hby){
        const dmg=this.isHvy?this.d.hvyDmg:this.d.atkDmg+this.combo;
        if(e.hit(dmg,this.facing*(this.isHvy?110:65),-110)){
          this.hitSet.add(e);
          this.combo++;this.comboT=1.8;this.comboDisp=this.combo;
          ftxt(e.x,e.y-e.h-4,this.isHvy?dmg+'!!':''+dmg,this.isHvy?P.star:P.white,this.isHvy?8:6,6);
          shake(this.isHvy?4:2,.07); G.hitstop=this.isHvy?.07:.04;
          this.score+=10*this.combo;
        }
      }
    }
  }
  activatePower(enemies,G){
    this.magic-=this.d.powerCost; this.pwrCd=1.8;
    if(this.ci===0){ // Kael — Nebula Fission
      G.boom={x:this.x,y:this.y,r:0,maxR:88,t:.55,c:P.plasma};
      burstParts(this.x,this.y-12,P.plasma,25,110,14,'lighter');
      burstParts(this.x,this.y-12,P.star,15,80,10,'lighter');
      for(const e of enemies)if(e.alive){const d=dist2(e.x,e.x,this.x,this.y);if(d<90){e.hit(50,this.facing*80,-130);ftxt(e.x,e.y-e.h,'50★',P.star,9,8);}}
      shake(6,.4); G.hitstop=.12;
    } else if(this.ci===1){ // Lyra — Stellar Rain
      G.stellarRain={x:this.x,y:this.y,arrows:[],t:1.8};
      for(let i=0;i<12;i++) G.stellarRain.arrows.push({x:this.x+rnd(-100,100),sy:-20,vy:0,delay:i*.12,active:false,hit:false});
      burstParts(this.x,this.y-40,P.lyraBlades,20,90,10,'lighter');
      shake(3,.2);
    } else { // Zorn — Gravity Collapse
      G.grav={x:this.x,y:this.y,t:0,phase:0};
      shake(5,.3);
      for(const e of enemies)if(e.alive){e.vx=(this.x-e.x)*3;e.vy=-80;e.onGround=false;}
      burstParts(this.x,this.y-20,P.zorn1,25,100,12,'lighter');
    }
  }
  draw(camX){
    const sx=this.x-camX, a=this.alive?1:Math.max(0,1-this.deathT/1.5);
    DRAW_CHAR[this.ci](sx,this.y,this.facing,this.state,this.hf>.0,this.iframes,!this.alive,a);
  }
}

// ── Enemy base ────────────────────────────────────
class EBase extends Entity {
  constructor(x,y,hp,w,h,spd,dmg,range,aggro,score){
    super(x,y,hp,w,h);
    this.spd=spd;this.dmg=dmg;this.range=range;this.aggro=aggro;this.sv=score;
    this.st='patrol';this.stT=0;this.dieT=0;
  }
  update(dt,P,G){
    if(!this.alive){this.dieT+=dt;return;}
    this.iframes=Math.max(0,this.iframes-dt);this.hf=Math.max(0,this.hf-dt);this.stT-=dt;
    this.x+=this.vx*dt; this.applyGravity(dt);
    this.y=clamp(this.y,FLOOR_Y-28,FLOOR_Y);
    this.x=clamp(this.x,G.camX-30,G.camX+BW+30);
    if(!this.onGround){this.vx*=.9;}else{this.vx*=.8;if(Math.abs(this.vx)<1)this.vx=0;}
    if(!P.alive)return;
    const dx=P.x-this.x,dy=P.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
    this.facing=dx>0?1:-1;
    if(this.st==='patrol'){if(d<this.aggro)this.st='aggro';}
    else if(this.st==='aggro'){
      this.x+=Math.sign(dx)*this.spd*dt;this.y+=Math.sign(dy)*this.spd*.4*dt;
      if(d<this.range&&this.stT<=0){this.st='atk';this.stT=this.atkCd||1;this.doAtk(P,G);}
    }else if(this.st==='atk'){if(this.stT<=0)this.st=d<this.aggro?'aggro':'patrol';}
    else if(this.st==='stunned'){if(this.stT<=0)this.st='aggro';}
  }
  doAtk(P,G){if(!P.alive||P.iframes>0)return;P.hit(this.dmg,0,-55,this);ftxt(P.x,P.y-32,'-'+this.dmg,'#ef4444',6);shake(2,.1);}
  onDie(){ burstParts(this.x,this.y-this.h/2,this.dc||P.red,8,90,8); burstParts(this.x,this.y-this.h/2,P.star,4,60,6); }
}

// ── Boss 2 : Astral Serpent ───────────────────────
class BossSerpent extends EBase {
  constructor(x,y){super(x,y,250,22,30,50,10,28,999,1500);this.dc='#06b6d4';this.atkCd=.8;this.phase=1;this.phT=0;this.projs=[];this.sineT=0;this.enraged=false;this.segs=Array.from({length:8},(_,i)=>({x:x+i*20,y:y}));}
  update(dt,pl,G){
    if(!this.alive){this.dieT+=dt;return;}
    this.iframes=Math.max(0,this.iframes-dt);this.hf=Math.max(0,this.hf-dt);this.phT=Math.max(0,this.phT-dt);
    this.sineT+=dt;
    if(this.hp<=125&&this.phase===1){this.phase=2;this.enraged=true;this.spd=80;shake(7,.4);ftxt(this.x,this.y-55,'ENRAGÉ!','#06b6d4',11,10);}
    this.projs=this.projs.filter(p=>p.life>0);
    for(const p of this.projs){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
      if(pl.alive&&pl.iframes<=0){const dx=p.x-pl.x,dy=p.y-(pl.y-12);if(Math.sqrt(dx*dx+dy*dy)<9){pl.hit(6,p.vx*.5,-60);p.life=0;shake(2,.08);}}}
    if(!pl.alive)return;
    const dx=pl.x-this.x,dy=pl.y-this.y;
    this.facing=dx>0?1:-1;
    const sine=Math.sin(this.sineT*2)*40;
    if(this.phT<=0){
      const d=dist2(this.x,this.y,pl.x,pl.y);
      if(d<this.range){this.doAtk(pl,G);this.phT=this.enraged?.6:.9;shake(3,.12);}
      else if(this.phase===2&&this.phT<=0&&Math.random()<.02){
        for(let i=0;i<6;i++){const a=-Math.PI/2+i*(Math.PI*2/6);this.projs.push({x:this.x,y:this.y-15,vx:Math.cos(a)*75,vy:Math.sin(a)*75,life:1.6});}
        this.phT=1.4;burstParts(this.x,this.y-15,P.plasma,12,70,10,'lighter');
      }
      else{this.x+=Math.sign(dx)*this.spd*dt;this.y+=Math.sign(dy+sine*.3)*this.spd*.5*dt;}
    }
    // Update snake segments
    for(let i=this.segs.length-1;i>0;i--){this.segs[i].x=lerp(this.segs[i].x,this.segs[i-1].x,.2);this.segs[i].y=lerp(this.segs[i].y,this.segs[i-1].y,.2);}
    this.segs[0].x=this.x;this.segs[0].y=this.y;
    this.y=clamp(this.y,FLOOR_Y-30,FLOOR_Y);this.x=clamp(this.x,G.camX+20,G.camX+BW-20);
  }
  draw(cx){
    const dead=!this.alive;if(dead&&this.dieT>2)return;
    const a=dead?Math.max(0,1-this.dieT/2):1;const fl=this.hf>.0;
    const c1=fl?P.white:'#22d3ee',c2=fl?P.white:'#0e7490';
    // Draw segments (body)
    CX.globalAlpha=a;
    for(let i=this.segs.length-1;i>0;i--){
      const s=this.segs[i],r=8-i*.7;
      CX.shadowBlur=4;CX.shadowColor=c1;
      circle(~~(s.x-cx),~~s.y-8,r,i%2===0?c1:c2);CX.shadowBlur=0;
    }
    // Head
    const sx=~~(this.x-cx),sy=~~this.y,f=this.facing;
    CX.shadowBlur=this.enraged?14:8;CX.shadowColor=c1;
    circle(sx,sy-15,14,c1);CX.shadowBlur=0;
    px(sx-6,sy-22,12,8,c2);
    px(sx+(f>0?4:-16),sy-22,12,4,c1);
    // Eyes
    CX.shadowBlur=8;CX.shadowColor=this.enraged?'#fbbf24':'#fff';
    px(sx+(f>0?3:-7),sy-18,4,4,this.enraged?'#fbbf24':'#fff');CX.shadowBlur=0;
    // Projectiles
    for(const p of this.projs){CX.shadowBlur=8;CX.shadowColor=P.plasma;circle(~~(p.x-cx),~~p.y,5,P.plasma);CX.shadowBlur=0;}
    this.drawHpBar();CX.globalAlpha=1;
  }
}

class Pickup{
  constructor(x,y,type){this.x=x;this.y=y;this.type=type;this.alive=true;this.bob=rnd(0,Math.PI*2);}

    if(!this.alive)return;

      this.alive=false;
      if(this.type==='magic'&&pl.magic<pl.maxMagic){pl.magic++;ftxt(pl.x,pl.y-32,'★ MAGIE',P.star,7,8);burstParts(this.x,this.y,P.star,8,60,10);}

  draw(cx){
    if(!this.alive)return;

function drawHUD(pl,G){
  // HP bar
  const bw=90;

  const hpC=hpR>.5?P.hp:hpR>.25?'#facc15':'#ef4444';

  CX.strokeStyle='#4c1d95';CX.lineWidth=1;CX.strokeRect(8,8,bw,9);
  txt('HP',8,7,5,'#a78bfa');
  txt(pl.hp+'/'+pl.d.hp,102,16,5,'#e8d5ff');

  // Magic stars
  for(let i=0;i<pl.maxMagic;i++){
    const f=i<pl.magic;
    CX.globalAlpha=f?1:.3;
    CX.shadowBlur=f?8:0;CX.shadowColor=P.star;
    CX.fillStyle=P.star;
    const sx2=8+i*16;

  // Combo

  }

  // Level indicator

  // Score
  CX.shadowBlur=4;CX.shadowColor=P.star;txt('★ '+pl.score,BW-8,14,6,P.star,'right',true);CX.shadowBlur=0;

  CX.globalAlpha=1;
  txt('— CHOISIR TON GUERRIER —',BW/2,20,7,'#a855f7','center',true,6);
  const positions=[BW/2-130,BW/2,BW/2+130];
  for(let i=0;i<3;i++){
    const d=CHAR_DEFS[i],cx2=positions[i],isSel=i===sel;
    // Frame
    const fc=isSel?'#a855f7':'#2d1b69';
    CX.globalAlpha=isSel?.9:.5;
    CX.fillStyle=isSel?'#1a0040':'#0a0020';CX.fillRect(cx2-42,35,84,200);
    CX.strokeStyle=fc;CX.lineWidth=isSel?2:1;CX.strokeRect(cx2-42,35,84,200);
    CX.lineWidth=1;CX.globalAlpha=1;
    // Character preview
    DRAW_CHAR[i](cx2,145,1,'idle',false,0,false,1);
    // Name
    CX.shadowBlur=isSel?8:0;CX.shadowColor=d.c1;
    txt(d.name,cx2,50,9,isSel?d.c1:'#7c3aed','center',true);CX.shadowBlur=0;
    txt(d.title,cx2,62,5,'#7c3aed','center');
    // Stats bars
    const stats=[['HP',d.hp/150],['VIT',d.spd/125],['ATK',d.atkDmg/13]];
    for(let j=0;j<3;j++){
      const sy=170+j*18;
      txt(stats[j][0],cx2-38,sy+9,5,'#7c3aed');
      px(cx2-18,sy,50,8,P.hpDark);
      px(cx2-18,sy,~~(50*stats[j][1]),8,j===0?P.hp:j===1?P.plasma:P.star);
    }
    // Desc
    txt(d.powerName,cx2,220,5,d.c1,'center',true);
    txt(d.powerDesc,cx2,230,4,'#7c3aed','center');
    if(isSel){txt('▲',cx2,BH-50,10,P.star,'center',true,8);}
  }
  const instr=`◄ ► Choisir  |  Z/Espace Confirmer`;
  txt(instr,BW/2,BH-14,5,'#4c1d95','center');
}

// ══════════════════════════════════════════════════
//  STORY SCREEN
// ══════════════════════════════════════════════════
function drawStory(sIdx,t,dur){
  CX.fillStyle='#000';CX.fillRect(0,0,BW,BH);
  for(const s of STARS){CX.globalAlpha=Math.sin(t+s.tw)*.3+.5;CX.fillStyle=s.c;CX.fillRect(~~s.x,~~s.y,~~s.sz,~~s.sz);}
  CX.globalAlpha=1;
  const sd=STORY[sIdx];
  const alpha=Math.min(1,t*1.5,dur*1.5);CX.globalAlpha=alpha;
  let sy=BH/2-sd.lines.length*12;
  for(const ln of sd.lines){
    const isTitle=ln.startsWith('NIVEAU')||ln.startsWith('✦');
    txt(ln,BW/2,sy,isTitle?10:7,isTitle?P.star:P.light,'center',isTitle,isTitle?8:0);
    sy+=isTitle?20:14;
  }
  if(t>dur-.8){const bl=Math.min(1,(dur-t)/.8)*alpha;CX.globalAlpha=bl;txt('Appuie sur Z pour continuer',BW/2,BH-18,5,'#7c3aed','center');}
  CX.globalAlpha=1;
}

// ══════════════════════════════════════════════════
//  GAME
// ══════════════════════════════════════════════════
class Game{
  constructor(){ this.reset(); }
  reset(){
    this.state='menu';
    this.charSel=0;
    this.player=null;
    this.entities=[];
    this.pickups=[];
    this.lvlIdx=0;
    this.waveIdx=0;
    this.waveText='';
    this.waveTextT=0;
    this.waveClearT=0;
    this.camX=0;
    this.targetCam=0;
    this.boom=null;
    this.stellarRain=null;
    this.grav=null;
    this.overlayT=0;
    this.storyIdx=0;
    this.storyT=0;
    this.boss=null;
    PARTS.length=0;FTXTS.length=0;
  }
  startGame(ci){
    this.player=new Player(80,FLOOR_Y,ci);
    this.lvlIdx=0;
    this.waveIdx=0;
    this.camX=0;
    this.entities=[];
    this.pickups=[];
    this.storyIdx=0;
    this.state='story';
    this.storyT=0;
  }
  spawnWave(){
    const lv=LEVELS[this.lvlIdx], wv=lv.waves[this.waveIdx];
    const baseX=this.camX+BW*0.65;
    for(const e of wv){
      let ent;
      const ex=baseX+e.ox,ey=FLOOR_Y;
      if(e.type==='soldier')ent=new VoidSoldier(ex,ey);
      else if(e.type==='beast')ent=new AstralBeast(ex,ey);
      else if(e.type==='shaman')ent=new CelestialShaman(ex,ey);
      else if(e.type==='archer')ent=new VoidArcher(ex,ey);
      else if(e.type==='knight')ent=new DarkKnight(ex,ey);
      else if(e.type==='boss1'){ent=new BossWarden(ex,ey);this.boss=ent;}
      else if(e.type==='boss2'){ent=new BossSerpent(ex,ey);this.boss=ent;}
      else if(e.type==='boss3'){ent=new BossMalakar(ex,ey);this.boss=ent;}
      if(ent)this.entities.push(ent);
    }
    const isBoss=wv.some(e=>e.type.startsWith('boss'));
    this.waveText=isBoss?'✦ BOSS : '+LEVELS[this.lvlIdx].bossName+' ✦':'— Vague '+(this.waveIdx+1)+'/'+LEVELS[this.lvlIdx].waves.length+' —';
    this.waveTextT=2.5;
    this.waveIdx++;
  }
  spawnEnemy(type,x,y){ /* used by boss summons */ }
  getInput(){
    return { lx:(K.left?-1:0)+(K.right?1:0), ly:(K.up?-1:0)+(K.down?1:0),
      atk:K.atk, heavy:K.heavy, power:K.power, jump:K.jump };
  }
  update(dt){
    const inp=this.getInput();
    const edgeAtk=edge('atk'),edgeJmp=edge('jump'),edgeR=edge('restart');
    // Menu
    if(this.state==='menu'){
      if(edgeAtk||edgeJmp){this.state='charsel';}
      updatePrev();return;
    }
    // Char select
    if(this.state==='charsel'){
      if(K.left&&!prev.left)this.charSel=(this.charSel+2)%3;
      if(K.right&&!prev.right)this.charSel=(this.charSel+1)%3;
      if(edgeAtk||edgeJmp){this.startGame(this.charSel);}
      updatePrev();return;
    }
    // Story
    if(this.state==='story'){
      this.storyT+=dt;
      const sd=STORY[this.storyIdx];
      if((edgeAtk||edgeJmp)&&this.storyT>sd.wait*.4){
        this.storyIdx++;
        if(this.storyIdx%2===0){this.state='playing';this.spawnWave();}
        else this.storyT=0;
      }
      updatePrev();return;
    }
    // Gameover/victory
    if(this.state==='gameover'||this.state==='victory'){
      this.overlayT+=dt;
      if(edgeR||(edgeAtk&&this.overlayT>2)){this.reset();}
      updatePrev();return;
    }
    // Playing
    if(hitstop>0){hitstop-=dt;updatePrev();return;}
    // Player
    this.player.update(dt,inp,this.entities,this);
    if(!this.player.alive&&this.player.deathT>2){this.state='gameover';this.overlayT=0;updatePrev();return;}
    // Entities
    const deadScored=new Set();
    for(const e of this.entities){
      e.update(dt,this.player,this);
      if(!e.alive&&!deadScored.has(e)&&e.dieT<.05){
        deadScored.add(e);
        this.player.score+=e.sv;
        if(Math.random()<LEVELS[this.lvlIdx].dropRate)this.pickups.push(new Pickup(e.x+rnd(-12,12),e.y,Math.random()<.6?'magic':'hp'));
      }
    }
    this.entities=this.entities.filter(e=>e.alive||e.dieT<1.5);
    // Pickups
    for(const pk of this.pickups)pk.update(dt,this.player);
    this.pickups=this.pickups.filter(pk=>pk.alive);
    // Wave clear
    const alive=this.entities.filter(e=>e.alive);
    if(alive.length===0&&this.waveClearT<=0)this.waveClearT=1;
    if(this.waveClearT>0){this.waveClearT-=dt;
      if(this.waveClearT<=0&&this.entities.filter(e=>e.alive).length===0){
        if(this.waveIdx<LEVELS[this.lvlIdx].waves.length){this.spawnWave();}
        else if(this.boss&&!this.boss.alive){
          // Level complete
          if(this.lvlIdx===2){
            this.storyIdx=6;this.storyT=0;this.state='story'; // victory story
          }else{
            this.lvlIdx++;this.waveIdx=0;this.boss=null;
            this.entities=[];this.pickups=[];
            this.storyIdx=2+this.lvlIdx*2-1;this.storyT=0;this.state='story';
          }
        }
      }
    }
    // Special effects update
    this.updateBoom(dt);this.updateStellarRain(dt,this.entities);this.updateGrav(dt,this.entities);
    // Camera
    if(this.boss&&this.boss.alive){
      this.targetCam=clamp(this.player.x-BW*.4,this.camX-1,this.camX+1);
      this.targetCam=clamp(this.targetCam,this.camX-30,this.camX+BW*.2);
    }else{
      this.targetCam=clamp(this.player.x-BW*.35,0,9999);
    }
    this.camX=lerp(this.camX,this.targetCam,.09);
    // Shake
    if(shk>0){shk-=dt;if(shk<=0)shkM=0;}
    // Wave text
    if(this.waveTextT>0)this.waveTextT-=dt;
    // Particles
    updateParts(dt);updateFtxts(dt);
    updatePrev();
  }
  updateBoom(dt){
    if(!this.boom)return;
    this.boom.r+=(this.boom.maxR-this.boom.r)*.25;
    this.boom.t-=dt;
    if(this.boom.t<=0)this.boom=null;
  }
  updateStellarRain(dt,enemies){
    if(!this.stellarRain)return;
    this.stellarRain.t-=dt;
    for(const ar of this.stellarRain.arrows){
      if(ar.delay>0){ar.delay-=dt;continue;}
      if(!ar.active){ar.active=true;ar.y=ar.sy;}
      ar.vy+=500*dt;ar.y+=ar.vy*dt;
      if(!ar.hit&&ar.y>0){
        for(const e of enemies)if(e.alive){const dx=e.x-ar.x,dy=e.y-ar.y;if(Math.sqrt(dx*dx+dy*dy)<20){e.hit(12,dx*.5,-80);ftxt(e.x,e.y-e.h,'12',P.lyraBlades,7,6);burstParts(ar.x,ar.y,P.lyraBlades,6,60,8);ar.hit=true;break;}}
        if(ar.y>FLOOR_Y){ar.hit=true;burstParts(ar.x,FLOOR_Y,P.star,4,40,6);}
      }
    }
    if(this.stellarRain.t<=0)this.stellarRain=null;
  }
  updateGrav(dt,enemies){
    if(!this.grav)return;
    this.grav.t+=dt;
    if(this.grav.t>.8&&this.grav.phase===0){
      this.grav.phase=1;
      for(const e of enemies)if(e.alive){
        const dx=e.x-this.grav.x;
        e.hit(40,dx>0?-100:100,-150);ftxt(e.x,e.y-e.h,'40★',P.star,9,10);
      }
      burstParts(this.grav.x,this.grav.y-20,'#3b82f6',30,150,16,'lighter');
      shake(8,.4);
    }
    if(this.grav.t>1.5)this.grav=null;
  }
  draw(){
    CX.save(); CX.scale(SC,SC);
    // Shake offset
    let ox=0,oy=0;
    if(shk>0){ox=(Math.random()-.5)*shkM*2;oy=(Math.random()-.5)*shkM*2;CX.translate(~~ox,~~oy);}
    const camX=~~this.camX;
    // Menu
    if(this.state==='menu'){this.drawMenu();postProcess();CX.restore();return;}
    if(this.state==='charsel'){drawCharSelect(this.charSel);postProcess();CX.restore();return;}
    if(this.state==='story'){drawStory(this.storyIdx,this.storyT,STORY[this.storyIdx]?.wait||3);postProcess();CX.restore();return;}
    // Background
    drawBg(this.lvlIdx,camX);
    // Boom effect
    if(this.boom){
      const a=this.boom.t/.55;
      CX.globalAlpha=a*.3;CX.globalCompositeOperation='lighter';CX.fillStyle=this.boom.c;CX.beginPath();CX.arc(~~(this.boom.x-camX),~~this.boom.y-12,~~this.boom.r,0,Math.PI*2);CX.fill();
      CX.globalCompositeOperation='source-over';CX.globalAlpha=a*.5;ring(~~(this.boom.x-camX),~~this.boom.y-12,~~this.boom.r*.65,P.star,3,12);CX.globalAlpha=1;
    }
    // Stellar rain
    if(this.stellarRain){
      for(const ar of this.stellarRain.arrows){
        if(!ar.active||ar.hit)continue;
        CX.shadowBlur=8;CX.shadowColor=P.lyraBlades;
        px(ar.x-camX-1,ar.y,3,10,P.lyraBlades);px(ar.x-camX-3,ar.y-2,7,3,P.star);
        CX.shadowBlur=0;
      }
    }
    // Grav collapse
    if(this.grav&&this.grav.phase===0){
      const pr=this.grav.t/.8;
      CX.globalAlpha=pr*.4;CX.globalCompositeOperation='lighter';CX.fillStyle='#3b82f6';CX.beginPath();CX.arc(~~(this.grav.x-camX),~~this.grav.y-20,40*pr,0,Math.PI*2);CX.fill();CX.globalCompositeOperation='source-over';CX.globalAlpha=1;
    }
    // Pickups
    for(const pk of this.pickups)pk.draw(camX);
    // Entities sorted by depth
    const all=[this.player,...this.entities].sort((a,b)=>a.y-b.y);
    for(const e of all)e.draw(camX);
    // Particles
    drawParts(camX);
    // Float texts
    drawFtxts(camX);
    // HUD
    drawHUD(this.player,this);
    // Overlay
    this.drawOverlay();
    postProcess();
    CX.restore();
  }
  drawMenu(){
    const t=Date.now()/1000;
    CX.fillStyle='#000';CX.fillRect(0,0,BW,BH);
    for(const s of STARS){CX.globalAlpha=Math.sin(t*1.1+s.tw)*.4+.7;CX.fillStyle=s.c;CX.fillRect(~~s.x,~~s.y,~~s.sz,~~s.sz);}
    CX.globalAlpha=1;
    // Nebula bg
    CX.globalAlpha=.08;CX.fillStyle='#7c3aed';CX.beginPath();CX.ellipse(BW/2,BH*.4,180,80,0,0,Math.PI*2);CX.fill();CX.globalAlpha=1;
    const p=1+Math.sin(t*1.5)*.025;
    CX.save();CX.translate(BW/2,BH/2-50);CX.scale(p,p);
    CX.shadowBlur=20;CX.shadowColor='#7c3aed';txt('✦',0,-38,30,P.star,'center',true);CX.shadowBlur=0;
    CX.shadowBlur=14;CX.shadowColor='#a855f7';txt('COSMIC AXE',0,2,24,P.nebula,'center',true);CX.shadowBlur=0;
    CX.restore();
    txt('Beat\'em Up  ·  Sci-Fantasy  ·  Arcade',BW/2,BH/2-10,6,'#6d28d9','center');
    txt('3 Personnages  ·  3 Niveaux  ·  Pouvoirs Cosmiques',BW/2,BH/2+6,5,'#4c1d95','center');
    if(Math.floor(t*2)%2===0){CX.shadowBlur=6;CX.shadowColor=P.star;txt('▸  Appuie sur Z pour commencer',BW/2,BH/2+30,7,P.star,'center',true);CX.shadowBlur=0;}
    txt('Prototype v2.0',BW-6,BH-8,4,'#2d1b69','right');
  }
  drawOverlay(){
    if(this.state==='gameover'){
      const a=Math.min(.88,this.overlayT*1.5);
      CX.globalAlpha=a;CX.fillStyle='#000';CX.fillRect(0,0,BW,BH);CX.globalAlpha=1;
      CX.shadowBlur=16;CX.shadowColor='#ef4444';txt('GAME OVER',BW/2,BH/2-16,20,'#ef4444','center',true);CX.shadowBlur=0;
      txt('Score final : '+this.player.score,BW/2,BH/2+8,8,'#e8d5ff','center');
      if(this.overlayT>1.5){CX.shadowBlur=4;CX.shadowColor=P.star;txt('R  —  Recommencer',BW/2,BH/2+26,7,P.star,'center',true);CX.shadowBlur=0;}
    }else if(this.state==='victory'||( this.state==='story'&&STORY[this.storyIdx]?.victory)){
      // handled by story screen
    }
  }
}

// ── Loop ──────────────────────────────────────────
const G=new Game();
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);
  lastT=ts;
  CX.clearRect(0,0,CV.width,CV.height);
  G.update(dt);
  G.draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
